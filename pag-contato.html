<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pag-contato.css">
    <title>Nos Contate</title>
</head>

<body>
    <header>
        <div class="HeaderContainer">
            <img class="PetabitHeaderLogo" src="/src/PetabitheaderLogo.png" alt="Logo Petabit">
            <nav class="menunavegacao">
                <a class="HeaderLink" href="#">Início</a>
                <a class="HeaderLink" href="#">Solução</a>
                <a class="HeaderLink" href="#">Blog</a>
                <a class="HeaderLink" href="#">Contato</a>
            </nav>
        </div>
    </header>

    <div class="contatocontent">
        <div>
            <div class="ContactContainer">
                <div class="ZapMailContainer">
                    <h1>Entre em Contato</h1>
                    <a class="ZapMailValue" href="#"><img src="src/ContatoZap.png" style="width: 32px; height:32px;"><h1>(8X) X XXXX-XXXX</h1></a>
                </div>
                <div class="ZapMailContainer">
                    <h1>Trabalhe Conosco</h1>
                    <a class="ZapMailValue" href="#"><img src="src/ContatoMail.png" style="width: 32; height:23px;"><h1>(8X) X XXXX-XXXX</h1></a>
                </div>
            </div>
            <div class="SugestionBox">
                <div class="sugestiontop">Sugestões? Dúvidas?</div>
                <div class="sugest-center-div">
                <div>Seu Nome:</div>
                <input id="InputNome" class="InputNome"></input>
                <div>Endereço de Email:</div>
                <input id="InputEmail" class="InputEmail"></input>
                <div>Sua sugestão:</div>
                <input id="InputSugest" class="InputSugest"></input>
                </div>
            </div>
        </div>
    </div>

    <footer class="Footer">
        <div class="FooterContainer">
            <div>Footer</div>
        </div>
    </footer>
</body>

</html>
