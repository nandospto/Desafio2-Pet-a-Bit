<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Pet a Bit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Pet a Bit Logo">
        </div>

        <button class="menu-mobile" id="btn-menu">
            <img src="menu-icon.png" alt="Menu" width="35">
        </button>

        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="solucao.html">Solução</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="secao-criacao">
            <h1 class="titulo-amarelo">Compartilhe a Sua Experiência:</h1>

            <div class="caixa-formulario">
                <form id="post-form">

                    <div class="grupo-input">
                        <label for="author">Seu nome:</label>
                        <input type="text" id="author" name="author" placeholder="Nome" required>
                    </div>

                    <div class="grupo-input">
                        <label for="title">Título:</label>
                        <input type="text" id="title" name="title" placeholder="Título" required>
                    </div>

                    <div class="grupo-input">
                        <label for="content">Conteúdo:</label>
                        <textarea id="content" name="content" required></textarea>
                    </div>

                    <button type="submit" class="btn-enviar">Enviar</button>
                </form>
            </div>
        </section>

        <section class="secao-feed">

            <div id="blog-posts" class="grid-de-cards">
            </div>

        </section>
    </main>

    <footer>
        <div class="rodape-conteudo">
            <p>Pet a Bit</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
