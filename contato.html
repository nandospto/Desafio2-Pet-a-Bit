<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contato.css">
    <title>Nos Contate</title>
</head>

<body>
    <header>
        <div class="logo">
            <img class="PetabitHeaderLogo" src="src/PetabitheaderLogo.png" alt="Logo Pet-a-Bit">
        </div>

        <nav class="menunavegacao">
            <input type="checkbox" id="menu-toggle" class="menu-checkbox">
            <label for="menu-toggle" class="menu-btn">&#9776;</label>
            
            <ul class="menu-links-container">
                <li class="menuContImg">
                    <img class="imgpatinhas" src="src/patinhas.png" alt="">
                    <a class="HeaderLink" href="src/paginaInicial.html">Início</a>
                </li>
                <li class="menuContImg">
                    <img class="imgpatinhas" src="src/patinhas.png" alt="">
                    <a class="HeaderLink" href="solucao.html">Solução</a>
                </li>
                <li class="menuContImg">
                    <img class="imgpatinhas" src="src/patinhas.png" alt="">
                    <a class="HeaderLink" href="blog.html">Blog</a>
                </li>
                <li class="menuContImg">
                    <img class="imgpatinhas" src="src/patinhas.png" alt="">
                    <a class="HeaderLink" href="#">Contato</a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="ContatoContainerGeral">
        <div class="ContactContainerZapMail">
            <div class="ZapMailContainer">
                <h1>Entre em Contato</h1>
                <a class="ZapMailValue" href="#"><img src="src/ContatoZap.png" style="width: 32px; height:32px;">
                    <h2>(8X) X XXXX-XXXX</h2>
                </a>
            </div>
            <div class="ZapMailContainer">
                <h1>Trabalhe Conosco</h1>
                <a class="ZapMailValue" href="#"><img src="src/ContatoMail.png" style="width: 32; height:23px;">
                    <h2>petabit@email.com</h2>
                </a>
            </div>
        </div>
        <div class="SugestionBox">
            <div class="sugestiontop">Sugestões? Dúvidas?</div>
            <div class="sugest-center-div">
                <label>Seu Nome:</label>
                <input id="InputNome" class="InputNome">
                <label>Endereço de Email:</label>
                <input id="InputEmail" class="InputEmail">
                <label>Sua sugestão:</label>
                <textarea id="InputSugest" class="InputSugest"></textarea>
            </div>
            <button class="ButtonSugestionEnviar">Enviar</button>
        </div>
    </div>

    <footer class="footer">
    <div class="footer-links">
        <p>Pet-a-Bit</p>
        <a href="solucao.html">Solução</a>
        <a href="blog.html">Blog</a>
        <a href="contato.html">Contato</a>
    </div>
    <div class="footer-social">
        <p>Saiba Mais</p>
        <div class="social-icons">
            <a href="https://instagram.com"><img src="src/Instagram.svg" alt="Ícone-Instagram"></a>
            <a href="https://facebook.com"><img src="src/Facebook.svg" alt="Ícone-Facebook"></a>
            <a href="https://youtube.com"><img src="src/Youtube.svg" alt="Ícone-Youtube"></a>
        </div>
    </div>
</footer>
</body>

</html>
